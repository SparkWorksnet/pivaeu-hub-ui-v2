version: '3.8'

services:
  vanilla.ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3000}
      - VITE_AUTHENTICATION_KEYCLOAK_URL=${VITE_AUTHENTICATION_KEYCLOAK_URL:}
      - VITE_AUTHENTICATION_KEYCLOAK_REALM=${VITE_AUTHENTICATION_KEYCLOAK_REALM:}
      - VITE_AUTHENTICATION_KEYCLOAK_CLIENT_ID=${VITE_AUTHENTICATION_KEYCLOAK_CLIENT_ID:}
      - VITE_SUPERSET_URL=${VITE_SUPERSET_URL:}
      - VITE_API_HUB_SEARCH_URL=${VITE_API_HUB_SEARCH_URL:-https://demo.piveau.io/api/hub/search/}
      - VITE_API_HUB_REPO_URL=${VITE_API_HUB_REPO_URL:-https://demo.piveau.io/api/hub/repo/}
      - VITE_API_HUB_STORE_URL=${VITE_API_HUB_STORE_URL:-https://demo.piveau.io/api/hub/store/}
      - VITE_API_MIDDLEWARE_URL=${VITE_API_MIDDLEWARE_URL:-http://localhost:5000}
      - VITE_API_SPARQL_URL=${VITE_API_SPARQL_URL:-https://demo.piveau.io/sparql}

